[package]
name = "nelfusion"
version = "0.1.0"
edition = "2024"
authors = ["Anany Tanwar"]
description = "A UCI chess engine written in Rust"
license = "GPL-3.0"
readme = "README.md"

[[bin]]
name = "Nelfusion"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
panic = "abort"

[profile.dev]
opt-level = 0
debug = true